name: "🐞 Bug Report"
description: Report a reproducible bug or regression.
title: "bug: <title>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill out the
        sections below so we can reproduce and fix the issue quickly.
  - type: checkboxes
    id: checks
    attributes:
      label: First checks
      options:
        - label: I searched [existing issues](https://github.com/search?q=org%3Aperishdev&type=issues) and didn't find a duplicate.
          required: true
        - label: I am reporting a reproducible bug, not asking a question (questions go to [Discussions](https://github.com/orgs/perishdev/discussions)).
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal, reproducible example, or exact steps to trigger the bug.
      value: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      description: Paste any relevant log output. This is automatically formatted as code, so no backticks are needed.
      render: shell
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of the project are you using?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
