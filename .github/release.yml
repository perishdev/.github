# Configuration for GitHub's automatically generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    authors:
      - dependabot
      - dependabot[bot]
      - github-actions
      - github-actions[bot]
  categories:
    - title: "🚀 Features"
      labels: ["enhancement"]
    - title: "🐞 Bug Fixes"
      labels: ["bug"]
    - title: "📚 Documentation"
      labels: ["documentation"]
    - title: "🔧 Other Changes"
      labels: ["*"]
